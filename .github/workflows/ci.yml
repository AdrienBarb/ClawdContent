name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=src/lib/db/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit
